<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juringle - 뉴스로 찾는 관련주</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#F0F2F5;}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;}
.logo{font-size:52px;font-weight:500;margin-bottom:8px;}
.j1{color:#4285F4;}.j2{color:#EA4335;}.j3{color:#FBBC05;}
.tagline{font-size:14px;color:#666;margin-bottom:36px;}
.sbox{width:100%;max-width:560px;display:flex;align-items:center;background:white;border:1px solid #ddd;border-radius:28px;padding:10px 18px;}
.sbox:focus-within{border-color:#4285F4;box-shadow:0 0 0 3px rgba(66,133,244,0.1);}
.sinput{flex:1;border:none;outline:none;background:transparent;font-size:16px;color:#333;padding:0 12px;}
.sinput::placeholder{color:#aaa;}
.sbtn{background:#4285F4;color:white;border:none;border-radius:20px;padding:7px 18px;font-size:13px;cursor:pointer;}
.sbtn:hover{background:#3367d6;}
.notice{margin-top:20px;width:100%;max-width:560px;background:#E6F1FB;border:1px solid #B5D4F4;border-radius:8px;padding:10px 16px;}
.ntext{font-size:13px;color:#0C447C;line-height:1.7;}
.ntext b{font-weight:500;}
.snum{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#4285F4;color:white;font-size:10px;font-weight:500;margin-right:4px;vertical-align:middle;}
.resp{margin-top:8px;width:100%;max-width:560px;text-align:center;font-size:12px;color:#A32D2D;}
.loading{text-align:center;font-size:14px;color:#666;padding:32px;display:none;width:100%;max-width:560px;} .spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top:3px solid #4285F4;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;} @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.rbox{width:100%;max-width:560px;margin-top:16px;display:none;}
.rinner{background:white;border:1px solid #e0e0e0;border-radius:12px;padding:20px 24px;font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;}
.disc{margin-top:10px;font-size:12px;color:#A32D2D;background:#FCEBEB;border:1px solid #F7C1C1;border-radius:8px;padding:8px 12px;}
.summary{background:white;border:none;border-radius:16px;padding:18px 20px;font-size:14px;line-height:1.8;color:#333;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.tabs{display:flex;gap:8px;margin-bottom:12px;}
.tab{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:white;font-size:14px;cursor:pointer;color:#666;}
.tab.active{color:white;border-color:transparent;} #tab-good.active{background:#E53935;} #tab-bad.active{background:#1565C0;}
.tpanel{display:flex;flex-direction:column;gap:10px;}
.stock-card{background:white;border:none;border-radius:16px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:10px;word-break:keep-all;word-wrap:break-word;overflow-wrap:break-word;}
.stock-card.good{border-left:5px solid #E53935;background:white;} .stock-card.bad{border-left:5px solid #1565C0;background:white;}

.stock-name{font-size:17px;font-weight:800;color:#111;margin-bottom:6px;letter-spacing:-0.3px;}
.stock-point{font-size:13px;color:#4285F4;margin-bottom:8px;}
.stock-row{font-size:13px;color:#555;line-height:1.6;}
.stock-label{color:#999;margin-right:4px;}
.tip{background:#FFFBEB;border-left:4px solid #F59E0B;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#92400E;margin-top:8px;} .warn{font-size:11px;color:#EA4335;font-weight:500;}
.stock-price-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.price{font-size:18px;font-weight:700;color:#222;}
.price-change{font-size:13px;font-weight:500;padding:2px 6px;border-radius:4px;}
.price-change.up{color:#E53935;background:#FFF0F0;}
.price-change.down{color:#1565C0;background:#F0F4FF;}
.price-na{font-size:12px;color:#999;} .price-label{font-size:10px;color:#999;background:#f5f5f5;padding:2px 5px;border-radius:3px;margin-left:4px;} .naver-btn{display:inline-block;margin-top:8px;font-size:12px;color:#03C75A;text-decoration:none;font-weight:500;} .naver-btn:hover{text-decoration:underline;}
.footer{margin-top:48px;font-size:12px;color:#aaa;display:flex;gap:16px;}
.news-section{width:100%;max-width:580px;margin-top:32px;}
.news-header{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;}
.news-title{font-size:13px;font-weight:700;color:#555;letter-spacing:0.3px;}
.news-badge{font-size:10px;background:#4285F4;color:white;padding:2px 7px;border-radius:10px;font-weight:600;}
.news-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:white;border-radius:14px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,0.06);transition:all 0.2s;border-left:3px solid transparent;}
.news-item:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateX(3px);border-left:3px solid #4285F4;}
.news-rank-wrap{display:flex;flex-direction:column;align-items:center;min-width:28px;}
.news-rank{font-size:14px;font-weight:900;color:#4285F4;line-height:1;}
.news-rank.hot{color:#E53935;}
.news-text{font-size:13px;color:#333;line-height:1.5;word-break:keep-all;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.news-arrow{font-size:12px;color:#ccc;flex-shrink:0;}
@media (max-width: 600px) {
    .wrap{padding:1.5rem 0.8rem;}
    .sbox{padding:8px 14px;}
    .sinput{font-size:14px;}
    .sbtn{padding:8px 14px;font-size:13px;}
    .logo{font-size:40px;}
    .tab{padding:12px;font-size:15px;}
    .stock-card{padding:14px 16px;}
    .stock-name{font-size:15px;}
    .price{font-size:16px;}
    .summary{padding:14px 16px;}
    .rbox{margin-top:12px;}
    .tabs{gap:6px;}
}
.footer a{color:#aaa;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
<a href="/" style="text-decoration:none"><div id="user-area" style="position:fixed;top:12px;right:12px;z-index:999;"></div>
<div class="logo"><span class="j1">J</span><span class="j2">u</span><span class="j3">r</span><span class="j1">i</span><span class="j5">n</span><span class="j2">g</span><span class="j1">l</span><span class="j5">e</span></div></a>
<div class="tagline">뉴스 링크 하나로 관련 주식을 찾아드려요</div>
<div id="user-area-mobile" style="display:none;margin-top:10px;"></div>
<style>
@media (max-width:480px) {
  #user-area { display:none !important; }
  #user-area-mobile { display:block !important; }
}
</style>

<script>
fetch('/me').then(r=>r.json()).then(data=>{
    const area = document.getElementById('user-area');
    const areaMobile = document.getElementById('user-area-mobile');
    if(data.logged_in){
        area.innerHTML = '<img src="'+data.picture+'" style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:8px;">'
            + '<span style="color:#555;">'+data.name+'</span>'
            + ' <a href="/logout" style="color:#EA4335;margin-left:12px;font-size:13px;">로그아웃</a>';
    } else {
        const loginBtn = '<a href="/login" style="display:inline-flex;align-items:center;gap:8px;background:white;color:#444;padding:8px 16px;border-radius:24px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #dadce0;box-shadow:0 1px 4px rgba(0,0,0,0.15);"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><path fill=\"#4285F4\" d=\"M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z\"/><path fill=\"#34A853\" d=\"M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z\"/><path fill=\"#FBBC05\" d=\"M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z\"/><path fill=\"#EA4335\" d=\"M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z\"/></svg>구글로 로그인</a>';
    if(areaMobile) areaMobile.innerHTML = loginBtn;
    area.innerHTML = '<a href="/login" style="display:flex;align-items:center;gap:8px;background:white;color:#444;padding:8px 16px;border-radius:24px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #dadce0;box-shadow:0 1px 4px rgba(0,0,0,0.15);"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><path fill=\"#4285F4\" d=\"M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z\"/><path fill=\"#34A853\" d=\"M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z\"/><path fill=\"#FBBC05\" d=\"M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z\"/><path fill=\"#EA4335\" d=\"M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z\"/></svg>구글로 로그인</a>';
    }
});
</script>
<div class="sbox">
<input class="sinput" id="sinput" placeholder="뉴스 기사 URL을 붙여넣으세요..." />
<button class="sbtn" id="sbtn">분석</button>
</div>

<div class="resp">⚠️ 본 서비스는 AI 분석 참고용이며, 투자 책임은 본인에게 있습니다.</div>
<div class="loading" id="loading"><div class="spinner"></div><div id="loading-msg">기사 읽는 중...</div></div>
<div class="rbox" id="rbox">
<div class="summary" id="summary"></div>
<div class="tabs">
    <button class="tab active" id="tab-good" onclick="showTab('good')">👍 호재 종목</button>
    <button class="tab" id="tab-bad" onclick="showTab('bad')">👎 악재 종목</button>
</div>
<div class="tpanel" id="panel-good"></div>
<div class="tpanel" id="panel-bad" style="display:none"></div>
<div class="disc">⚠️ 이 분석은 AI가 생성한 참고용 정보입니다. 투자 권유가 아니며, 투자 책임은 본인에게 있습니다.</div>
</div>
<div class="news-section" id="news-section">
<div class="news-header"><span class="news-title">📰 오늘의 경제 뉴스</span><span class="news-badge">클릭하면 바로 분석</span></div>
<div id="news-list">로딩 중...</div>
</div>
<div class="footer"><a href="/about">서비스 소개</a><a href="/terms">이용약관</a><a href="/privacy">개인정보처리방침</a></div>
</div>
<script>
function showTab(type) {
    document.getElementById('panel-good').style.display = type === 'good' ? 'flex' : 'none';
    document.getElementById('panel-bad').style.display = type === 'bad' ? 'flex' : 'none';
    document.getElementById('tab-good').className = 'tab' + (type === 'good' ? ' active' : '');
    document.getElementById('tab-bad').className = 'tab' + (type === 'bad' ? ' active' : '');
}
function renderStocks(stocks, type) {
    if (!stocks || stocks.length === 0) return '<div style="color:#999;font-size:14px;padding:12px">관련 종목이 없습니다.</div>';
    return stocks.map(function(s) {
        return '<div class="stock-card ' + type + '">' +
            '<div class="stock-header">' +
            '<div class="stock-name">' + 
            (s.verified === false ? 
                '<span style="color:#999;text-decoration:line-through">' + s.name + ' (' + s.ticker + ')</span> <span class="warn">⚠️ 티커 오류</span>' :
                (s.real_name && s.real_name !== s.name ? 
                    s.real_name + ' (' + s.ticker + ')' :
                    s.name + ' (' + s.ticker + ')'
                )
            ) + 
            '</div>' +
            '</div>' +
            '<div class="stock-price-row">' +
            (s.price ? 
                '<span class="price">' + s.price.price + '원</span>' + '<span class="price-label">전일 종가</span>' +
                '<span class="price-change ' + (s.price.is_up ? 'up' : 'down') + '">' + s.price.change_pct + '</span>'
                : '<span class="price-na">주가 정보 없음</span>'
            ) +
            '</div>' +
            '<div class="stock-point">' + s.point + '</div>' +
            '<div class="stock-row"><span class="stock-label">' + (type === 'good' ? '수혜 이유' : '악재 이유') + '</span>' + s.reason + '</div>' +
            '<div class="stock-row"><span class="stock-label">주목 포인트</span>' + s.check + '</div>' +
            '<a class="naver-btn" href="https://finance.naver.com/item/main.naver?code=' + s.ticker + '" target="_blank">네이버 증권에서 확인 →</a>' +
            '</div>';
    }).join('');
}
function go() {
    var u = document.getElementById('sinput').value.trim();
    if (!u) { alert('URL을 입력해주세요!'); return; }
    document.getElementById('loading').style.display = 'block';
    document.getElementById('rbox').style.display = 'none';
    var msgs = ['📰 기사 읽는 중...', '🔍 AI가 종목 분석 중...', '📊 관련주 검증 중...', '✅ 거의 다 됐어요...'];
    var msgDone = false;
    var mi = 0;
    var mt = setInterval(function() {
        mi = (mi + 1) % msgs.length;
        var el = document.getElementById('loading-msg');
        if(msgDone) return;
        if (el) el.innerHTML = msgs[mi];
    }, 7000);
    var x = new XMLHttpRequest();
    x.open('POST', '/analyze', true);
    x.setRequestHeader('Content-Type', 'application/json');
    x.onload = function() {
        clearInterval(mt);
        msgDone = false; document.getElementById('loading').style.display = 'none';
        var d = JSON.parse(x.responseText);
        if (d.error) {
            document.getElementById('summary').innerHTML = '<span style="color:#EA4335">❌ ' + d.error + '</span>';
            document.getElementById('rbox').style.display = 'block';
            document.getElementById('news-section').style.display = 'none';
            return;
        }
        try {
            var r = JSON.parse(d.result);
            document.getElementById('summary').innerHTML = '📰 ' + r.summary + (r.tip ? '<div class="tip">💡 ' + r.tip + '</div>' : '');
            document.getElementById('panel-good').innerHTML = renderStocks(r.good, 'good');
            document.getElementById('panel-bad').innerHTML = renderStocks(r.bad, 'bad');
            var hasBad = r.bad && r.bad.length > 0;
            document.getElementById('tab-bad').style.display = hasBad ? 'block' : 'none';
            document.getElementById('rbox').style.display = 'block';
            showTab('good');
            document.getElementById('news-section').style.display = 'none';
        } catch(e) {
            document.getElementById('summary').innerHTML = d.result;
            document.getElementById('rbox').style.display = 'block';
        }
    };
    x.send(JSON.stringify({url: u}));
}
document.getElementById('sbtn').onclick = go;

// 오늘의 뉴스 로딩
function loadNews() {
    var x = new XMLHttpRequest();
    x.open('GET', '/today-news', true);
    x.onload = function() {
        var d = JSON.parse(x.responseText);
        var container = document.getElementById('news-list');
        container.innerHTML = '';
        d.news.forEach(function(item, i) {
            var div = document.createElement('div');
            div.className = 'news-item';
            div.dataset.url = item.link;
            var rankClass = i < 3 ? 'news-rank hot' : 'news-rank';
            div.innerHTML = '<div class="news-rank-wrap"><span class="' + rankClass + '">' + (i+1) + '</span></div><span class="news-text">' + item.title + '</span><span class="news-arrow">›</span>';
            div.addEventListener('click', function() {
                document.getElementById('sinput').value = this.dataset.url;
                window.scrollTo({top: 0, behavior: 'smooth'});
                go();
            });
            container.appendChild(div);
        });
    };
    x.send();
}

function analyzeNews(el) {
    var url = el.getAttribute('data-url');
    document.getElementById('sinput').value = url;
    window.scrollTo({top: 0, behavior: 'smooth'});
    go();
}

loadNews();
document.getElementById('sinput').onkeypress = function(e) { if (e.keyCode === 13) go(); };
</script>
</body>
</html>
